---
# .github/workflows/autoupdate.yml
name: Weekly Auto-update Versions

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run version detector and create Pull Request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Configure git credentials
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 2. Check out a dedicated branch
          git checkout -b auto-update-versions

          # 3. Run script to check and modify versions
          python3 scripts/detect_bumps.py --write

          # 4. Check if files were modified
          if [ -n "$(git status --porcelain)" ]; then
            echo "Changes detected, committing and pushing..."
            git add .
            git commit -m "chore: auto-bump hardcoded versions"

            # Push using token authentication
            git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" auto-update-versions

            # Check if a Pull Request already exists for this branch
            PR_EXISTS=$(gh pr list --head auto-update-versions --json number --jq '.[0].number' 2>/dev/null || true)

            if [ -z "$PR_EXISTS" ]; then
              echo "Creating new Pull Request..."
              gh pr create \
                --title "chore: weekly update of hardcoded versions" \
                --body "This is an automated pull request to update the hardcoded third-party package and font versions in the repository to their latest releases." \
                --head auto-update-versions \
                --base master
            else
              echo "Pull Request #$PR_EXISTS already exists and has been updated."
            fi
          else
            echo "No changes detected. Everything is up to date."
          fi
